{% extends 'base.html' %}
{% load static %}
{% block title %}Schedule Task{% endblock %}
{% block content %}
<div class="container">
    <div class="row align-items-center mb-3">
        <div class="col text-center">
            <h2>Schedule Task</h2>
        </div>
    </div>
    <hr>
    <div class="row justify-content-center mt-4">
        <div class="col-md-6">
            <div class="modal-content" style="background-color: #efdcd7; border: 2px solid #9a786e; border-radius: 10px;">
                <div class="modal-header" style="border-bottom: 2px dashed #9a786e;">
                    <h5 class="modal-title" style="color: #9a786e; font-weight: bold;">Schedule Task</h5>
                </div>
                <div class="modal-body mybox p-4 m-0" style="background-color: transparent; border: none; height: auto;">
                    <div class="task-form">
                        <div class="mb-3">
                            <label class="myFormLabel">Task Content</label>
                            <div class="form-control" style="min-height: 40px; display: flex; align-items: center; background-color: #ffffff; border: 0;">
                                {{ log_entry.content }}
                            </div>
                        </div>
                        <form method="post" action="{% url 'schedule_task' log_type log_entry.id %}">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label for="scheduled_date" class="myFormLabel">Select Date to Schedule</label>
                                <input type="date" class="form-control" id="scheduled_date" name="scheduled_date" style="border: 0;" required>
                            </div>
                            <div class="mb-3 mt-4">
                                <a href="javascript:history.back()" class="btn mybtn_cancel me-2">Cancel</a>
                                <button type="submit" class="btn mybtn">Schedule</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
