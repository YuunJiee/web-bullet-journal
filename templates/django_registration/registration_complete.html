{% extends 'base.html' %}
{% block title %}Email Verification Required{% endblock %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card text-center login-box">
        <div class="card-body">
            <h4 class="card-title">Thank You for Registering</h4>
            <p class="card-text">Please check your email to verify your account.</p>
            <p class="card-text mb-0"><small>Didn't receive the email?</small></p>
            <a href="{% url 'resend_activation' %}" class="mylink">Resend activation email</a>
        </div>
    </div>
</div>
{% endblock %}
