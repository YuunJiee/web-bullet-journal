{% extends 'base.html' %}
{% block title %}Account Activation Failed{% endblock %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card text-center login-box">
        <div class="card-body">
            <h4 class="card-title">Account Activation Failed</h4>
            <p class="card-text">Please check your email for the verification link and try again.</p>
            <p class="card-text mb-0"><small>Still no luck?</small></p>
            <a href="{% url 'resend_activation' %}" class="mylink">Resend activation email</a>
        </div>
    </div>
</div>
{% endblock %}
